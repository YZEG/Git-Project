<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说推荐网 - 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <span>小说推荐网</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-page="books">
                    <i class="fas fa-book"></i>
                    <span>书籍管理</span>
                </button>
                <button class="nav-item" data-page="users">
                    <i class="fas fa-users"></i>
                    <span>用户管理</span>
                </button>
                <button class="nav-item" data-page="statistics">
                    <i class="fas fa-chart-bar"></i>
                    <span>数据统计</span>
                </button>
                <button class="nav-item" data-page="spider">
                    <i class="fas fa-spider"></i>
                    <span>爬虫工具</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <span id="adminName">管理员</span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </aside>

        <main class="main-panel">
            <header class="panel-header">
                <h1 id="pageTitle">书籍管理</h1>
                <div class="header-actions">
                    <button class="add-btn" id="addBtn" onclick="openAddModal()">
                        <i class="fas fa-plus"></i>
                        <span>新增</span>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="page active" id="books">
                    <div class="search-area">
                        <input type="text" id="bookSearch" placeholder="搜索书名或作者...">
                        <select id="bookStatusFilter">
                            <option value="">全部状态</option>
                            <option value="连载">连载中</option>
                            <option value="完结">已完结</option>
                        </select>
                        <button class="search-btn" onclick="searchBooks()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>状态</th>
                                <th>标签</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody"></tbody>
                    </table>
                    <div class="pagination" id="booksPagination"></div>
                </div>

                <div class="page" id="users">
                    <div class="search-area">
                        <input type="text" id="userSearch" placeholder="搜索用户名或手机号...">
                        <select id="userRoleFilter">
                            <option value="">全部角色</option>
                            <option value="admin">管理员</option>
                            <option value="user">普通用户</option>
                        </select>
                        <button class="search-btn" onclick="searchUsers()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>手机号</th>
                                <th>角色</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                    <div class="pagination" id="usersPagination"></div>
                </div>

                <div class="page" id="statistics">
                    <div class="stats-table-area">
                        <h3>系统数据概览</h3>
                        <table class="data-table stats-table">
                            <thead>
                                <tr>
                                    <th>统计项</th>
                                    <th>数值</th>
                                    <th>说明</th>
                                </tr>
                            </thead>
                            <tbody id="statsTableBody">
                                <tr>
                                    <td><i class="fas fa-book"></i> 书籍总数</td>
                                    <td id="statBooks">0</td>
                                    <td>系统中所有书籍的数量</td>
                                </tr>
                                <tr>
                                    <td><i class="fas fa-users"></i> 用户总数</td>
                                    <td id="statUsers">0</td>
                                    <td>注册用户总数（含管理员）</td>
                                </tr>
                                <tr>
                                    <td><i class="fas fa-edit"></i> 连载中</td>
                                    <td id="statSerializing">0</td>
                                    <td>当前状态为连载的书籍数量</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="page" id="spider">
                    <div class="spider-config">
                        <div class="spider-inputs">
                            <h4 style="margin-bottom:14px;color:#333;"><i class="fas fa-spider" style="color:#667eea;margin-right:8px;"></i>起点月票榜爬虫</h4>
                            <div class="spider-field">
                                <label>爬取页码</label>
                                <div style="display:flex;gap:10px;align-items:center;">
                                    <input type="number" id="spiderPageStart" value="1" min="1" max="50" style="width:80px;text-align:center;">
                                    <span style="color:#999;">至</span>
                                    <input type="number" id="spiderPageEnd" value="1" min="1" max="50" style="width:80px;text-align:center;">
                                    <span style="color:#999;font-size:13px;">每页20本，共 <b id="spiderEstimate">20</b> 本</span>
                                </div>
                            </div>
                            <div class="spider-field">
                                <label>
                                    <input type="checkbox" id="spiderAutoSave" checked style="margin-right:6px;">
                                    爬取后自动保存到书籍库
                                </label>
                            </div>
                            <div class="spider-actions">
                                <button class="spider-run-btn" onclick="runQidianSpider()">
                                    <i class="fas fa-play"></i> 开始爬取
                                </button>
                                <button class="spider-clear-btn" onclick="clearSpider()">
                                    <i class="fas fa-eraser"></i> 清空结果
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="spider-status" id="spiderStatus" style="display:none;">
                        <span id="spiderStatusText"></span>
                    </div>
                    <div class="spider-results" id="spiderResults" style="display:none;">
                        <div class="spider-results-header">
                            <h4>爬取结果（共 <span id="spiderCount">0</span> 本）</h4>
                        </div>
                        <div class="spider-table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>排名</th>
                                        <th>书名</th>
                                        <th>作者</th>
                                        <th>状态</th>
                                        <th>标签</th>
                                        <th>简介</th>
                                    </tr>
                                </thead>
                                <tbody id="spiderTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailModalTitle">书籍详情</h3>
                <span class="close-modal" onclick="closeDetailModal()">&times;</span>
            </div>
            <div style="padding: 20px;">
                <div style="margin-bottom: 15px;">
                    <strong style="color:#666;">作者：</strong>
                    <span id="detailAuthor"></span>
                </div>
                <div style="margin-bottom: 15px;">
                    <strong style="color:#666;">状态：</strong>
                    <span id="detailStatus" class="status"></span>
                </div>
                <div style="margin-bottom: 15px;">
                    <strong style="color:#666;">标签：</strong>
                    <div id="detailTags" style="display: inline-flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;"></div>
                </div>
                <div>
                    <strong style="color:#666;">简介：</strong>
                    <p id="detailIntro" style="margin-top: 8px; color:#666; line-height: 1.6;"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="bookModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增书籍</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="bookForm">
                <div class="form-group">
                    <label>书名 *</label>
                    <input type="text" id="bookName" required>
                </div>
                <div class="form-group">
                    <label>作者 *</label>
                    <input type="text" id="bookAuthor" required>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="bookStatus">
                        <option value="连载">连载</option>
                        <option value="完结">完结</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标签</label>
                    <div id="tagsContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 32px;"></div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="bookTagsInput" placeholder="输入标签后按回车添加" style="flex: 1;">
                        <button type="button" onclick="addTag()" class="add-tag-btn">添加</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>简介</label>
                    <textarea id="bookIntro" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="submit-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="userModalTitle">新增用户</h3>
                <span class="close-modal" onclick="closeUserModal()">&times;</span>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="userPhone">
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="password" id="userPassword" required>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select id="userRole">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeUserModal()">取消</button>
                    <button type="submit" class="submit-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
