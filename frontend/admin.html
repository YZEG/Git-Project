<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说推荐网 - 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <span>小说推荐网</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-page="books">
                    <i class="fas fa-book"></i>
                    <span>书籍管理</span>
                </button>
                <button class="nav-item" data-page="users">
                    <i class="fas fa-users"></i>
                    <span>用户管理</span>
                </button>
                <button class="nav-item" data-page="statistics">
                    <i class="fas fa-chart-bar"></i>
                    <span>数据统计</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <span id="adminName">管理员</span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </aside>

        <main class="main-panel">
            <header class="panel-header">
                <h1 id="pageTitle">书籍管理</h1>
                <div class="header-actions">
                    <button class="add-btn" id="addBtn" onclick="openAddModal()">
                        <i class="fas fa-plus"></i>
                        <span>新增</span>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="page active" id="books">
                    <div class="search-area">
                        <input type="text" id="bookSearch" placeholder="搜索书名或作者...">
                        <select id="bookStatusFilter">
                            <option value="">全部状态</option>
                            <option value="连载">连载中</option>
                            <option value="完结">已完结</option>
                        </select>
                        <button class="search-btn" onclick="searchBooks()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>状态</th>
                                <th>标签</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody"></tbody>
                    </table>
                    <div class="pagination" id="booksPagination"></div>
                </div>

                <div class="page" id="users">
                    <div class="search-area">
                        <input type="text" id="userSearch" placeholder="搜索用户名或手机号...">
                        <select id="userRoleFilter">
                            <option value="">全部角色</option>
                            <option value="admin">管理员</option>
                            <option value="user">普通用户</option>
                        </select>
                        <button class="search-btn" onclick="searchUsers()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>手机号</th>
                                <th>角色</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                    <div class="pagination" id="usersPagination"></div>
                </div>

                <div class="page" id="statistics">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-book"></i>
                            <div>
                                <span class="stat-value" id="statBooks">0</span>
                                <span class="stat-label">书籍总数</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-users"></i>
                            <div>
                                <span class="stat-value" id="statUsers">0</span>
                                <span class="stat-label">用户总数</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-star"></i>
                            <div>
                                <span class="stat-value" id="statFavorites">0</span>
                                <span class="stat-label">收藏总数</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-edit"></i>
                            <div>
                                <span class="stat-value" id="statSerializing">0</span>
                                <span class="stat-label">连载中</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="bookModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增书籍</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="bookForm">
                <div class="form-group">
                    <label>书名 *</label>
                    <input type="text" id="bookName" required>
                </div>
                <div class="form-group">
                    <label>作者 *</label>
                    <input type="text" id="bookAuthor" required>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="bookStatus">
                        <option value="连载">连载</option>
                        <option value="完结">完结</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标签</label>
                    <input type="text" id="bookTags" placeholder="多个标签用逗号分隔">
                </div>
                <div class="form-group">
                    <label>简介</label>
                    <textarea id="bookIntro" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="submit-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="userModalTitle">新增用户</h3>
                <span class="close-modal" onclick="closeUserModal()">&times;</span>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="userPhone">
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="password" id="userPassword" required>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select id="userRole">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeUserModal()">取消</button>
                    <button type="submit" class="submit-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
