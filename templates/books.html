<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            line-height: 1.6;
        }
        .sidebar {
            width: 160px;
            background: #2c3e50;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px 0;
            color: #ecf0f1;
        }
        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 20px;
            padding: 0 12px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .sidebar .nav-item {
            display: block;
            padding: 10px 12px;
            text-decoration: none;
            color: #bdc3c7;
            transition: all 0.2s ease;
            font-size: 13px;
        }
        .sidebar .nav-item:hover {
            background: #34495e;
            color: #ecf0f1;
        }
        .sidebar .nav-item.active {
            background: #3498db;
            color: white;
        }
        .sidebar .logout-btn {
            margin-top: 24px;
            margin-left: 12px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            width: calc(100% - 24px);
        }
        .sidebar .logout-btn:hover {
            background: #c0392b;
        }
        .main-content {
            margin-left: 160px;
            padding: 24px;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background: #1e8449;
        }
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        .btn-warning:hover {
            background: #d68910;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .btn-primary:hover {
            background: #2980b9;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 11px;
            min-width: 36px;
        }
        .table-container {
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        th {
            background: #fafafa;
            font-weight: 600;
            color: #555;
            font-size: 13px;
        }
        tr:hover {
            background: #fafafa;
        }
        .book-name-link {
            color: #3498db;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .book-name-link:hover {
            text-decoration: underline;
            color: #2980b9;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-active {
            background: #d5f4e6;
            color: #1e8449;
        }
        .status-completed {
            background: #ebf5fb;
            color: #2980b9;
        }
        .status-unknown {
            background: #fef5e7;
            color: #d68910;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 6px;
            width: 90%;
            max-width: 480px;
            padding: 24px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .modal .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: background 0.2s;
        }
        .modal .close-btn:hover {
            background: #e0e0e0;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 18px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }
        .pagination button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .pagination button.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        .pagination button:hover:not(:disabled) {
            background: #f0f0f0;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .search-panel {
            background: white;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            margin-bottom: 16px;
        }
        .search-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .search-group label {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }
        .search-group input, .search-group select {
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            min-width: 120px;
        }
        .search-group input:focus, .search-group select:focus {
            outline: none;
            border-color: #3498db;
        }
        .stats-bar {
            background: #ebf5fb;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 12px;
            color: #2980b9;
            font-size: 13px;
        }
        .stats-bar strong {
            font-size: 16px;
            font-weight: 600;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .actions-cell {
            display: flex;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📚 书籍管理</h2>
        <a href="#books" class="nav-item active" onclick="showSection('books')">书籍列表</a>
        <a href="#add" class="nav-item" onclick="showSection('add')">添加书籍</a>
        <h2 style="margin-top: 20px;">👥 用户管理</h2>
        <a href="#users" class="nav-item" onclick="showSection('users')">用户列表</a>
        <a href="#add-user" class="nav-item" onclick="showSection('add-user')">添加用户</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="page-title">书籍列表</h1>
        </div>

        <div id="advanced-search" class="search-panel">
            <div class="search-row">
                <div class="search-group">
                    <label>书名</label>
                    <input type="text" id="search-name" placeholder="书名关键词">
                </div>
                <div class="search-group">
                    <label>作者</label>
                    <input type="text" id="search-author" placeholder="作者关键词">
                </div>
                <div class="search-group">
                    <label>状态</label>
                    <select id="search-status">
                        <option value="">全部</option>
                        <option value="连载">连载</option>
                        <option value="完结">完结</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>标签</label>
                    <input type="text" id="search-tag" placeholder="标签关键词">
                </div>
                <div class="search-group">
                    <label>排序</label>
                    <select id="search-sort">
                        <option value="id_asc">ID升序</option>
                        <option value="id_desc">ID降序</option>
                        <option value="name_asc">书名升序</option>
                        <option value="name_desc">书名降序</option>
                        <option value="author_asc">作者升序</option>
                        <option value="author_desc">作者降序</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="search-stats" class="stats-bar" style="display: none;">
            <span>共找到 <strong id="result-count">0</strong> 条记录</span>
        </div>

        <div id="books-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>书名</th>
                            <th>作者</th>
                            <th>状态</th>
                            <th>标签</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="books-table-body">
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div id="add-section" style="display: none;">
            <div class="table-container" style="padding: 24px;">
                <h2 style="margin-bottom: 20px; color: #2c3e50; font-size: 18px; font-weight: 600;">添加书籍</h2>
                <form id="add-form">
                    <div class="form-group">
                        <label for="add-name">书名 *</label>
                        <input type="text" id="add-name" required placeholder="请输入书名">
                    </div>
                    <div class="form-group">
                        <label for="add-author">作者 *</label>
                        <input type="text" id="add-author" required placeholder="请输入作者">
                    </div>
                    <div class="form-group">
                        <label for="add-status">状态</label>
                        <select id="add-status">
                            <option value="连载">连载</option>
                            <option value="完结">完结</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="add-tags">标签</label>
                        <input type="text" id="add-tags" placeholder="多个标签用逗号分隔">
                    </div>
                    <div class="form-group">
                        <label for="add-intro">简介</label>
                        <textarea id="add-intro" placeholder="请输入书籍简介"></textarea>
                    </div>
                    <div class="action-bar">
                        <button type="submit" class="btn btn-success">保存</button>
                        <button type="button" class="btn btn-warning" onclick="showSection('books')">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="users-section" style="display: none;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>手机号</th>
                            <th>权限</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="users-pagination"></div>
        </div>

        <div id="add-user-section" style="display: none;">
            <div class="table-container" style="padding: 24px;">
                <h2 style="margin-bottom: 20px; color: #2c3e50; font-size: 18px; font-weight: 600;">添加用户</h2>
                <form id="add-user-form">
                    <div class="form-group">
                        <label for="add-user-username">用户名 *</label>
                        <input type="text" id="add-user-username" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="add-user-phone">手机号</label>
                        <input type="text" id="add-user-phone" placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label for="add-user-password">密码 *</label>
                        <input type="password" id="add-user-password" required placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label for="add-user-role">权限</label>
                        <select id="add-user-role">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="action-bar">
                        <button type="submit" class="btn btn-success">保存</button>
                        <button type="button" class="btn btn-warning" onclick="showSection('users')">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <button class="close-btn" onclick="closeEditModal()">&times;</button>
            <h2>编辑书籍</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-name">书名 *</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-author">作者 *</label>
                    <input type="text" id="edit-author" required>
                </div>
                <div class="form-group">
                    <label for="edit-status">状态</label>
                    <select id="edit-status">
                        <option value="连载">连载</option>
                        <option value="完结">完结</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-tags">标签</label>
                    <input type="text" id="edit-tags">
                </div>
                <div class="form-group">
                    <label for="edit-intro">简介</label>
                    <textarea id="edit-intro"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">保存修改</button>
                    <button type="button" class="btn btn-warning" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <button class="close-btn" onclick="closeDetailModal()">&times;</button>
            <h2>书籍详情</h2>
            <div id="detail-content"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-user-modal">
        <div class="modal">
            <button class="close-btn" onclick="closeEditUserModal()">&times;</button>
            <h2>编辑用户</h2>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">
                <div class="form-group">
                    <label for="edit-user-username">用户名 *</label>
                    <input type="text" id="edit-user-username" required>
                </div>
                <div class="form-group">
                    <label for="edit-user-phone">手机号</label>
                    <input type="text" id="edit-user-phone">
                </div>
                <div class="form-group">
                    <label for="edit-user-password">密码（留空则不修改）</label>
                    <input type="password" id="edit-user-password" placeholder="留空则不修改密码">
                </div>
                <div class="form-group">
                    <label for="edit-user-role">权限</label>
                    <select id="edit-user-role">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">保存修改</button>
                    <button type="button" class="btn btn-warning" onclick="closeEditUserModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let currentSearchParams = {};

        function showSection(section) {
            document.getElementById('books-section').style.display = section === 'books' ? 'block' : 'none';
            document.getElementById('add-section').style.display = section === 'add' ? 'block' : 'none';
            document.getElementById('users-section').style.display = section === 'users' ? 'block' : 'none';
            document.getElementById('add-user-section').style.display = section === 'add-user' ? 'block' : 'none';
            
            document.getElementById('advanced-search').style.display = section === 'books' ? 'block' : 'none';
            document.getElementById('search-stats').style.display = section === 'books' ? 'block' : 'none';
            
            document.querySelector('.nav-item.active').classList.remove('active');
            document.querySelector(`[href="#${section}"]`).classList.add('active');
            
            const titles = {
                'books': '书籍列表',
                'add': '添加书籍',
                'users': '用户列表',
                'add-user': '添加用户'
            };
            document.getElementById('page-title').textContent = titles[section] || '书籍列表';
            
            if (section === 'books') {
                loadBooks();
            } else if (section === 'users') {
                loadUsers();
            }
        }

        async function loadBooks(page = 1) {
            try {
                let url = `/api/books?page=${page}`;
                
                if (Object.keys(currentSearchParams).length > 0) {
                    const params = new URLSearchParams();
                    params.set('page', page);
                    Object.entries(currentSearchParams).forEach(([key, value]) => {
                        if (value) params.set(key, value);
                    });
                    url = `/api/books/search?${params.toString()}`;
                }
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }
                
                const data = await response.json();
                renderBooks(data.books);
                renderPagination(data.total_pages, page);
                currentPage = page;
                
                document.getElementById('result-count').textContent = data.total;
                document.getElementById('search-stats').style.display = 'block';
            } catch (error) {
                console.error('加载书籍失败:', error);
            }
        }

        const debouncedSearch = debounce(async function() {
            const sortValue = document.getElementById('search-sort').value;
            const [sort_by, sort_order] = sortValue.split('_');
            
            const searchKeyword = document.getElementById('search-name').value;
            
            currentSearchParams = {
                keyword: searchKeyword,
                author: document.getElementById('search-author').value,
                status: document.getElementById('search-status').value || null,
                tag: document.getElementById('search-tag').value,
                sort_by: sort_by,
                sort_order: sort_order
            };
            
            currentPage = 1;
            await loadBooks(1);
        }, 300);

        function initRealTimeSearch() {
            document.getElementById('search-name').addEventListener('input', debouncedSearch);
            document.getElementById('search-author').addEventListener('input', debouncedSearch);
            document.getElementById('search-status').addEventListener('change', debouncedSearch);
            document.getElementById('search-tag').addEventListener('input', debouncedSearch);
            document.getElementById('search-sort').addEventListener('change', debouncedSearch);
        }

        function renderBooks(books) {
            const tbody = document.getElementById('books-table-body');
            tbody.innerHTML = '';
            
            books.forEach(book => {
                const statusClass = book.status === '连载' ? 'status-active' : 
                                   book.status === '完结' ? 'status-completed' : 'status-unknown';
                const statusText = book.status === '连载' ? '连载中' : 
                                   book.status === '完结' ? '已完结' : '未知';
                
                tbody.innerHTML += `
                    <tr>
                        <td>${book.id}</td>
                        <td><span class="book-name-link" onclick="showDetail(${book.id})">${book.name}</span></td>
                        <td>${book.author}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${book.tags || '-'}</td>
                        <td class="actions-cell">
                            <button class="btn btn-xs btn-warning" onclick="showEditModal(${book.id})">编辑</button>
                            <button class="btn btn-xs btn-danger" onclick="deleteBook(${book.id})">删除</button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderPagination(total, current) {
            totalPages = total;
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            pagination.innerHTML += `<button onclick="loadBooks(${current - 1})" ${current <= 1 ? 'disabled' : ''}>上一页</button>`;
            
            for (let i = 1; i <= total; i++) {
                pagination.innerHTML += `<button onclick="loadBooks(${i})" ${i === current ? 'class="active"' : ''}>${i}</button>`;
            }
            
            pagination.innerHTML += `<button onclick="loadBooks(${current + 1})" ${current >= total ? 'disabled' : ''}>下一页</button>`;
        }

        document.getElementById('add-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const book = {
                name: document.getElementById('add-name').value,
                author: document.getElementById('add-author').value,
                status: document.getElementById('add-status').value,
                tags: document.getElementById('add-tags').value || null,
                intro: document.getElementById('add-intro').value || null
            };
            
            try {
                const response = await fetch('/api/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(book)
                });
                
                if (response.ok) {
                    alert('添加成功');
                    showSection('books');
                    document.getElementById('add-form').reset();
                } else {
                    alert('添加失败');
                }
            } catch (error) {
                alert('添加失败');
            }
        });

        async function showEditModal(id) {
            try {
                const response = await fetch(`/api/books/${id}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (response.ok) {
                    const book = await response.json();
                    document.getElementById('edit-id').value = book.id;
                    document.getElementById('edit-name').value = book.name;
                    document.getElementById('edit-author').value = book.author;
                    document.getElementById('edit-status').value = book.status;
                    document.getElementById('edit-tags').value = book.tags || '';
                    document.getElementById('edit-intro').value = book.intro || '';
                    document.getElementById('edit-modal').classList.add('active');
                }
            } catch (error) {
                console.error('获取书籍信息失败:', error);
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            document.getElementById('edit-form').reset();
        }

        document.getElementById('edit-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('edit-id').value;
            const book = {
                name: document.getElementById('edit-name').value,
                author: document.getElementById('edit-author').value,
                status: document.getElementById('edit-status').value,
                tags: document.getElementById('edit-tags').value || null,
                intro: document.getElementById('edit-intro').value || null
            };
            
            try {
                const response = await fetch(`/api/books/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(book)
                });
                
                if (response.ok) {
                    alert('更新成功');
                    closeEditModal();
                    loadBooks(currentPage);
                } else {
                    alert('更新失败');
                }
            } catch (error) {
                alert('更新失败');
            }
        });

        async function deleteBook(id) {
            if (!confirm('确定要删除这本书吗？')) return;
            
            try {
                const response = await fetch(`/api/books/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (response.ok) {
                    alert('删除成功');
                    loadBooks(currentPage);
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        async function showDetail(id) {
            try {
                const response = await fetch(`/api/books/${id}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (response.ok) {
                    const book = await response.json();
                    const statusText = book.status === '连载' ? '连载中' : '已完结';
                    document.getElementById('detail-content').innerHTML = `
                        <p><strong>书名：</strong>${book.name}</p>
                        <p><strong>作者：</strong>${book.author}</p>
                        <p><strong>状态：</strong>${statusText}</p>
                        <p><strong>标签：</strong>${book.tags || '无'}</p>
                        <p><strong>简介：</strong>${book.intro || '暂无简介'}</p>
                    `;
                    document.getElementById('detail-modal').classList.add('active');
                }
            } catch (error) {
                console.error('获取书籍详情失败:', error);
            }
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        function debounce(func, delay) {
            let timer = null;
            return function() {
                clearTimeout(timer);
                timer = setTimeout(func, delay);
            };
        }

        let currentUserPage = 1;
        let totalUserPages = 1;

        async function loadUsers(page = 1) {
            try {
                const response = await fetch(`/api/users?page=${page}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await response.json();
                renderUsers(data.users);
                renderUserPagination(data.total_pages, page);
                currentUserPage = page;
            } catch (error) {
                console.error('加载用户失败:', error);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';

            users.forEach(user => {
                const roleText = user.role === 'admin' ? '管理员' : '普通用户';
                const roleClass = user.role === 'admin' ? 'status-active' : 'status-completed';
                const createdAt = user.created_at ? new Date(user.created_at).toLocaleString('zh-CN') : '-';

                tbody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.phone || '-'}</td>
                        <td><span class="status-badge ${roleClass}">${roleText}</span></td>
                        <td>${createdAt}</td>
                        <td class="actions-cell">
                            <button class="btn btn-xs btn-warning" onclick="showEditUserModal(${user.id})">编辑</button>
                            <button class="btn btn-xs btn-danger" onclick="deleteUser(${user.id})">删除</button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderUserPagination(total, current) {
            totalUserPages = total;
            const pagination = document.getElementById('users-pagination');
            pagination.innerHTML = '';

            pagination.innerHTML += `<button onclick="loadUsers(${current - 1})" ${current <= 1 ? 'disabled' : ''}>上一页</button>`;

            for (let i = 1; i <= total; i++) {
                pagination.innerHTML += `<button onclick="loadUsers(${i})" ${i === current ? 'class="active"' : ''}>${i}</button>`;
            }

            pagination.innerHTML += `<button onclick="loadUsers(${current + 1})" ${current >= total ? 'disabled' : ''}>下一页</button>`;
        }

        document.getElementById('add-user-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = {
                username: document.getElementById('add-user-username').value,
                phone: document.getElementById('add-user-phone').value || null,
                password: document.getElementById('add-user-password').value,
                role: document.getElementById('add-user-role').value
            };

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(user)
                });

                if (response.ok) {
                    alert('添加用户成功');
                    showSection('users');
                    document.getElementById('add-user-form').reset();
                } else {
                    const data = await response.json();
                    alert('添加用户失败: ' + (data.detail || '未知错误'));
                }
            } catch (error) {
                alert('添加用户失败');
            }
        });

        async function showEditUserModal(id) {
            try {
                const response = await fetch(`/api/users/${id}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('edit-user-id').value = user.id;
                    document.getElementById('edit-user-username').value = user.username;
                    document.getElementById('edit-user-phone').value = user.phone || '';
                    document.getElementById('edit-user-role').value = user.role;
                    document.getElementById('edit-user-modal').classList.add('active');
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        function closeEditUserModal() {
            document.getElementById('edit-user-modal').classList.remove('active');
            document.getElementById('edit-user-form').reset();
        }

        document.getElementById('edit-user-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = document.getElementById('edit-user-id').value;
            const password = document.getElementById('edit-user-password').value;
            
            const user = {
                username: document.getElementById('edit-user-username').value,
                phone: document.getElementById('edit-user-phone').value || null,
                password: password || '******',
                role: document.getElementById('edit-user-role').value
            };

            try {
                const response = await fetch(`/api/users/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(user)
                });

                if (response.ok) {
                    alert('更新成功');
                    closeEditUserModal();
                    loadUsers(currentUserPage);
                } else {
                    const data = await response.json();
                    alert('更新失败: ' + (data.detail || '未知错误'));
                }
            } catch (error) {
                alert('更新失败');
            }
        });

        async function deleteUser(id) {
            if (!confirm('确定要删除该用户吗？')) return;

            try {
                const response = await fetch(`/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.ok) {
                    alert('删除成功');
                    loadUsers(currentUserPage);
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            loadBooks();
            initRealTimeSearch();
        });
    </script>
</body>
</html>
